name: worker_hiring
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  get: ^4.7.3
  cupertino_icons: ^1.0.8
  auto_size_text: ^3.0.0
  responsive_framework: ^1.5.1
  google_fonts: ^6.1.0
  get_storage: ^2.1.1

  # Development Tools
  device_preview: ^1.3.1
  flutter_svg: ^2.1.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  camera: ^0.11.3
  path_provider: ^2.1.5
  path: ^1.9.1
  smooth_page_indicator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  file_picker: ^10.3.10
  google_maps_flutter: ^2.16.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/icons/
    - assets/images/